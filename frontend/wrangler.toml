name = "simplestravel"
compatibility_date = "2026-07-16"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".open-next"

# KV-backed IP rate limiting for /api/verify and /api/admin-login — see
# lib/rateLimit.ts. Cloudflare's native Rate Limiting binding doesn't support
# Pages, and a Durable Object would require a second, separately deployed
# Worker (Pages can only bind to DOs defined in an external script) — decided
# against that extra infrastructure for this project's size. KV is only
# eventually consistent across edge locations (confirmed in production: a
# fixed-window counter can under-count if a client's requests land on
# different colos), so this is deliberate defense-in-depth against scripted
# abuse from a single location, not a hard guarantee against distributed
# traffic.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "d246b78738fc4153a48024e1e68a55f7"
